name: Java CI with Gradle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Start SUT
        run: |
          if [ -f ./artifacts/app-ibank-delivery.jar ]; then
            java -jar ./artifacts/app-ibank-delivery.jar -P:profile=test &
          elif [ -f ./artifacts/app-ibank.jar ]; then
            java -jar ./artifacts/app-ibank.jar -P:profile=test &
          else
            echo "ERROR: No jar file found"
            exit 1
          fi
          sleep 10

      - name: Run API tests only
        run: ./gradlew test --tests "*AuthTest"